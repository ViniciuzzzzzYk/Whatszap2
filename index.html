<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Whatszap 2 - VIP Edition</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="name-overlay">
        <div class="card">
            <h3>Escolha seu Nome</h3>
            <input type="text" id="name-input" placeholder="Ex: Zhyr_Rei">
            <button onclick="saveName()">Entrar no Chat</button>
        </div>
    </div>

    <div id="app">
        <div id="chat-side">
            <div id="header">
                <div class="user-info">
                    <div class="status-dot"></div>
                    <span id="display-name">Carregando...</span>
                </div>
                <div class="logo">Whatszap 2</div>
            </div>
            
            <div id="messages"></div>
            
            <div id="giphy-bar" class="hidden">
                <input type="text" id="gif-search" placeholder="Procurar figurinha..." oninput="searchGiphy()">
                <div id="gif-results"></div>
            </div>

            <div id="input-area">
                <button class="btn-tool" onclick="toggleGiphy()">🖼️</button>
                <input type="text" id="msgInput" placeholder="Digite uma mensagem...">
                <button onclick="send()">ENVIAR</button>
            </div>
        </div>

        <div id="casino-side">
            <div class="card gold">
                <div class="label">SALDO DISPONÍVEL</div>
                <div class="coins">🪙 <span id="coin-count">100</span></div>
            </div>

            <div class="card casino">
                <div class="casino-header">CASSINO ZHYR</div>
                <div class="slots" id="slot-res">🎰|🎰|🎰</div>
                <button class="btn-spin" onclick="spin()">GIRAR (10 🪙)</button>
            </div>

            <div id="log-system">
                <h4>Atividade Recente</h4>
                <div id="activity-log"></div>
            </div>
        </div>
    </div>

    <script>
        const ably = new Ably.Realtime('bQ9mYw.fE6QZw:Lbp86_Il-Q27JQ--_kukJ9SLo7cSSYHZHmUuBWULQ28'); 
        const channel = ably.channels.get('global-v2');
        const GIPHY_KEY = 'RWb8HVX8wdNamlAMXr66P5XReYEtBRa5'; // Pegue em developers.giphy.com

        let userName = localStorage.getItem('username') || "";
        let coins = parseInt(localStorage.getItem('coins')) || 100;

        if(userName) {
            document.getElementById('name-overlay').style.display = 'none';
            document.getElementById('display-name').innerText = userName;
        }

        function saveName() {
            const val = document.getElementById('name-input').value;
            if(val.length > 2) {
                userName = val;
                localStorage.setItem('username', val);
                document.getElementById('name-overlay').style.display = 'none';
                document.getElementById('display-name').innerText = val;
            }
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = coins;
            localStorage.setItem('coins', coins);
        }

        // Receber Mensagens e Alertas de Jackpot
        channel.subscribe('msg', (m) => {
            const box = document.getElementById('messages');
            let content = "";

            if(m.data.type === 'gif') {
                content = `<img src="${m.data.text}" class="gif-msg">`;
            } else if(m.data.type === 'jackpot') {
                content = `<div class="jackpot-alert">🔥 OPA! ${m.data.user} ACABOU DE GANHAR UM JACKPOT! 🔥</div>`;
            } else {
                content = m.data.text;
            }

            box.innerHTML += `
                <div class="msg-container ${m.data.user === userName ? 'me' : ''}">
                    <div class="msg">
                        <b>${m.data.user}</b>
                        ${content}
                    </div>
                </div>`;
            box.scrollTop = box.scrollHeight;
        });

        function send(text = null, type = 'text') {
            const input = document.getElementById('msgInput');
            const val = text || input.value;
            if(!val) return;
            channel.publish('msg', { user: userName, text: val, type: type });
            input.value = '';
            if(type === 'gif') toggleGiphy();
        }

        // GIPHY SYSTEM
        function toggleGiphy() { document.getElementById('giphy-bar').classList.toggle('hidden'); }

        async function searchGiphy() {
            const q = document.getElementById('gif-search').value;
            if(q.length < 3) return;
            const res = await fetch(`https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${q}&limit=6`);
            const data = await res.json();
            const results = document.getElementById('gif-results');
            results.innerHTML = data.data.map(g => `<img src="${g.images.fixed_height_small.url}" onclick="send('${g.images.fixed_height.url}', 'gif')">`).join('');
        }

        // CASSINO
        function spin() {
            if(coins < 10) return;
            coins -= 10;
            const icons = ['💎', '🍎', '🍀', '🔥', '7️⃣'];
            const a = icons[Math.floor(Math.random()*5)], b = icons[Math.floor(Math.random()*5)], c = icons[Math.floor(Math.random()*5)];
            document.getElementById('slot-res').innerText = `${a}|${b}|${c}`;
            
            if(a === b && b === c) {
                coins += 500;
                channel.publish('msg', { user: userName, type: 'jackpot' });
            } else if(a === b || b === c || a === c) {
                coins += 30;
            }
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
