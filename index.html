<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Whatszap 2 - Cassino</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { background: #0b141a; color: #e9edef; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Chat Area */
        #chat-side { width: 65%; display: flex; flex-direction: column; border-right: 1px solid #3b4a54; }
        #header { background: #202c33; padding: 15px; font-weight: bold; color: #00a884; display: flex; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; background-color: #0b141a; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .msg { background: #202c33; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 70%; border: 1px solid #2a3942; }
        .msg b { color: #ff3333; font-size: 0.8em; display: block; }
        
        /* Cassino Area */
        #casino-side { width: 35%; background: #111b21; padding: 20px; display: flex; flex-direction: column; align-items: center; border-left: 1px solid #3b4a54; }
        .card { background: #202c33; border-radius: 12px; padding: 20px; width: 100%; margin-bottom: 20px; text-align: center; border: 1px solid #00a884; }
        .coins { font-size: 35px; color: #ffd700; font-weight: bold; }
        .slots { font-size: 50px; background: #000; padding: 15px; border-radius: 10px; margin: 20px 0; border: 2px solid #ff3333; }
        
        /* Inputs */
        #input-area { background: #202c33; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        button { background: #00a884; border: none; padding: 10px 20px; border-radius: 8px; color: #fff; cursor: pointer; font-weight: bold; }
        .btn-spin { background: #ff3333; width: 100%; padding: 15px; font-size: 1.2em; }
    </style>
</head>
<body>

    <div id="chat-side">
        <div id="header">
            <span>Whatszap 2</span>
            <small id="my-name"></small>
        </div>
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="msgInput" placeholder="Mensagem...">
            <button onclick="send()">></button>
        </div>
    </div>

    <div id="casino-side">
        <div class="card">
            <div>SUAS MOEDAS</div>
            <div class="coins">🪙 <span id="coin-count">100</span></div>
        </div>

        <div class="card" style="border-color: #ff3333;">
            <h3>CASSINO ZHYR</h3>
            <div class="slots" id="slot-res">🎰|🎰|🎰</div>
            <button class="btn-spin" onclick="spin()">GIRAR (10 🪙)</button>
        </div>
    </div>

    <script>
        // Configuração do Chat (Substitua pela sua chave do Ably se o limite estourar)
        const ably = new Ably.Realtime('bQ9mYw.fE6QZw:Lbp86_Il-Q27JQ--_kukJ9SLo7cSSYHZHmUuBWULQ28'); 
        const channel = ably.channels.get('global-chat');
        
        // Gerar nome temporário
        const userAlias = "User_" + Math.floor(Math.random() * 999);
        document.getElementById('my-name').innerText = userAlias;

        // Sistema de Moedas (LocalStorage - Salva no navegador)
        let coins = parseInt(localStorage.getItem('coins')) || 100;
        updateUI();

        function updateUI() {
            document.getElementById('coin-count').innerText = coins;
            localStorage.setItem('coins', coins);
        }

        // Receber Mensagens
        channel.subscribe('msg', (m) => {
            const box = document.getElementById('messages');
            box.innerHTML += `<div class="msg"><b>${m.data.user}</b>${m.data.text}</div>`;
            box.scrollTop = box.scrollHeight;
        });

        // Enviar Mensagem
        function send() {
            const input = document.getElementById('msgInput');
            if(!input.value) return;
            channel.publish('msg', { user: userAlias, text: input.value });
            input.value = '';
        }

        // Sistema de Cassino
        function spin() {
            if(coins < 10) return alert("Acabou o dinheiro!");
            
            coins -= 10;
            const icons = ['💎', '🍎', '🍀', '🔥', '7️⃣'];
            const a = icons[Math.floor(Math.random()*icons.length)];
            const b = icons[Math.floor(Math.random()*icons.length)];
            const c = icons[Math.floor(Math.random()*icons.length)];
            
            document.getElementById('slot-res').innerText = `${a}|${b}|${c}`;
            
            if(a === b && b === c) {
                alert("JACKPOT! +200");
                coins += 200;
            } else if(a === b || b === c || a === c) {
                coins += 20;
            }
            
            updateUI();
        }

        // Enter para enviar
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') send();
        });
    </script>
</body>
</html>
